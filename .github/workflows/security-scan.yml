name: Package Security Scanning

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'packages/**'
      - 'scripts/package-security-scanner.py'
      - 'scripts/package-signature-verifier.py'
      - '.security-config.json'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'packages/**'
  schedule:
    # Run daily security scans at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      scan_level:
        description: 'Security scan depth'
        required: true
        default: 'standard'
        type: choice
        options:
        - quick
        - standard
        - comprehensive
      fail_on_warnings:
        description: 'Fail build on security warnings'
        required: false
        default: false
        type: boolean

env:
  SECURITY_CONFIG: .security-config.json

jobs:
  security-scan:
    name: Package Security Scan
    runs-on: ubuntu-latest

    outputs:
      scan_status: ${{ steps.scan.outputs.status }}
      vulnerabilities_found: ${{ steps.scan.outputs.vulnerabilities }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Julia
      uses: julia-actions/setup-julia@v1
      with:
        version: '1.12'

    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        components: rustfmt, clippy

    - name: Install security tools
      run: |
        # Python security tools
        pip install --upgrade pip
        pip install safety bandit semgrep
        pip install toml  # For parsing TOML files

        # Node.js security tools
        npm install -g npm-audit-resolver audit-ci

        # Rust security tools
        cargo install cargo-audit cargo-deny --force

        # Install additional dependencies for the scanner
        pip install requests urllib3

    - name: Cache security databases
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/safety
          ~/.cache/semgrep
          ~/.cache/cargo-audit
        key: ${{ runner.os }}-security-db-${{ hashFiles('**/Cargo.lock', '**/package-lock.json', '**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-security-db-

    - name: Run comprehensive security scan
      id: scan
      run: |
        # Set scan parameters based on input
        SCAN_LEVEL="${{ github.event.inputs.scan_level || 'standard' }}"
        FAIL_ON_WARNINGS="${{ github.event.inputs.fail_on_warnings || 'false' }}"

        echo "Running security scan at level: $SCAN_LEVEL"
        echo "Fail on warnings: $FAIL_ON_WARNINGS"

        # Run the main security scanner
        SCANNER_ARGS="--config $SECURITY_CONFIG"

        if [ "$FAIL_ON_WARNINGS" = "true" ]; then
          SCANNER_ARGS="$SCANNER_ARGS --fail-on-warnings"
        fi

        python3 scripts/package-security-scanner.py $SCANNER_ARGS \
          --output security-scan-results.json

        # Extract results for GitHub output
        SCAN_EXIT_CODE=$?

        if [ $SCAN_EXIT_CODE -eq 0 ]; then
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "status=failed" >> $GITHUB_OUTPUT
        fi

        # Count vulnerabilities
        VULN_COUNT=$(python3 -c "
        import json
        try:
            with open('security-scan-results.json', 'r') as f:
                data = json.load(f)
            total_vulns = sum(len(pkg.get('vulnerabilities', [])) for pkg in data.get('packages', {}).values())
            print(total_vulns)
        except:
            print(0)
        ")

        echo "vulnerabilities=$VULN_COUNT" >> $GITHUB_OUTPUT
        echo "Found $VULN_COUNT vulnerabilities"

        # Exit with the scanner's exit code
        exit $SCAN_EXIT_CODE

    - name: Run signature verification
      id: signature_check
      run: |
        echo "Running package signature verification..."

        python3 scripts/package-signature-verifier.py \
          --config $SECURITY_CONFIG \
          --output signature-verification-results.json

        SIGNATURE_EXIT_CODE=$?

        if [ $SIGNATURE_EXIT_CODE -eq 0 ]; then
          echo "Signature verification completed successfully"
        else
          echo "Signature verification found issues"
        fi

        # Don't fail the build on signature issues for now (warning only)
        # This allows packages without signatures to still pass while encouraging signing
        exit 0

    - name: Generate security report
      if: always()
      run: |
        echo "# 🔒 Security Scan Report" > security-report.md
        echo "" >> security-report.md
        echo "**Scan Date:** $(date -Iseconds)" >> security-report.md
        echo "**Trigger:** ${{ github.event_name }}" >> security-report.md
        echo "**Commit:** ${{ github.sha }}" >> security-report.md
        echo "" >> security-report.md

        # Add scan summary
        if [ -f security-scan-results.json ]; then
          python3 -c "
        import json
        with open('security-scan-results.json', 'r') as f:
            data = json.load(f)

        summary = data.get('summary', {})
        print('## 📊 Scan Summary')
        print('')
        print(f'- **Total Packages:** {summary.get(\"total_packages\", 0)}')
        print(f'- **Passed:** {summary.get(\"passed\", 0)} ✅')
        print(f'- **Warnings:** {summary.get(\"warnings\", 0)} ⚠️')
        print(f'- **Failed:** {summary.get(\"failed\", 0)} ❌')
        print('')

        # Package details
        print('## 📦 Package Results')
        print('')
        for pkg_name, pkg_result in data.get('packages', {}).items():
            status = pkg_result.get('status', 'unknown')
            emoji = {'passed': '✅', 'warning': '⚠️', 'failed': '❌', 'error': '💥'}.get(status, '❓')
            print(f'### {pkg_name} {emoji}')
            print(f'**Status:** {status}')

            vulns = pkg_result.get('vulnerabilities', [])
            if vulns:
                print(f'**Vulnerabilities:** {len(vulns)}')
                for vuln in vulns[:3]:  # Show first 3
                    print(f'- {vuln.get(\"package\", \"unknown\")}: {vuln.get(\"vulnerability\", \"unknown\")} ({vuln.get(\"severity\", \"unknown\")})')
                if len(vulns) > 3:
                    print(f'- ... and {len(vulns) - 3} more')

            warnings = pkg_result.get('warnings', [])
            if warnings:
                print(f'**Warnings:** {len(warnings)}')
                for warning in warnings[:2]:  # Show first 2
                    print(f'- {warning}')
                if len(warnings) > 2:
                    print(f'- ... and {len(warnings) - 2} more')
            print('')
        " >> security-report.md
        fi

        # Add signature verification results
        if [ -f signature-verification-results.json ]; then
          echo "## ✍️ Signature Verification" >> security-report.md
          echo "" >> security-report.md
          python3 -c "
        import json
        with open('signature-verification-results.json', 'r') as f:
            data = json.load(f)

        summary = data.get('verification_summary', {})
        if summary:
            print(f'- **Total Packages:** {summary.get(\"total_packages\", 0)}')
            print(f'- **Verified:** {summary.get(\"verified\", 0)} ✅')
            print(f'- **Partial:** {summary.get(\"partial\", 0)} 🔶')
            print(f'- **Unverified:** {summary.get(\"unverified\", 0)} ⚪')
            print(f'- **Failed:** {summary.get(\"failed\", 0)} ❌')
        " >> security-report.md
        fi

        echo "" >> security-report.md
        echo "## 🛠️ Tools Used" >> security-report.md
        echo "- Custom Security Scanner" >> security-report.md
        echo "- Package Signature Verifier" >> security-report.md
        echo "- Safety (Python)" >> security-report.md
        echo "- npm audit (Node.js)" >> security-report.md
        echo "- cargo audit (Rust)" >> security-report.md

    - name: Upload security scan results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-scan-results-${{ github.run_id }}
        path: |
          security-scan-results.json
          signature-verification-results.json
          security-report.md
        retention-days: 30

    - name: Post security report as comment (PR)
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');

          if (fs.existsSync('security-report.md')) {
            const report = fs.readFileSync('security-report.md', 'utf8');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
          }

    - name: Create issue for high-severity vulnerabilities
      if: steps.scan.outputs.vulnerabilities != '0' && steps.scan.outputs.status == 'failed'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');

          if (fs.existsSync('security-scan-results.json')) {
            const scanResults = JSON.parse(fs.readFileSync('security-scan-results.json', 'utf8'));
            const vulnCount = '${{ steps.scan.outputs.vulnerabilities }}';

            const issueBody = `
          # 🚨 Security Vulnerabilities Detected

          **Vulnerabilities Found:** ${vulnCount}
          **Scan Date:** ${new Date().toISOString()}
          **Commit:** ${{ github.sha }}
          **Workflow Run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ## Summary

          ${JSON.stringify(scanResults.summary, null, 2)}

          ## Action Required

          Please review the security scan results and address any high-severity vulnerabilities.

          - Download the full scan results from the workflow artifacts
          - Update vulnerable dependencies
          - Apply security patches where available
          - Consider alternative packages if vulnerabilities cannot be resolved

          This issue will be automatically updated when new scans are performed.
          `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security Scan: ${vulnCount} vulnerabilities found`,
              body: issueBody,
              labels: ['security', 'vulnerability', 'high-priority']
            });
          }

  # Additional job for comprehensive dependency analysis
  dependency-analysis:
    name: Dependency Security Analysis
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'schedule' || github.event.inputs.scan_level == 'comprehensive'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install analysis tools
      run: |
        pip install --upgrade pip
        pip install bandit semgrep cyclonedx-bom
        npm install -g @cyclonedx/cyclonedx-npm

    - name: Generate Software Bill of Materials (SBOM)
      run: |
        echo "Generating SBOM for all packages..."
        mkdir -p sbom-reports

        # Python SBOM
        if [ -d "packages/esm_format" ]; then
          cd packages/esm_format
          cyclonedx-py -o ../../sbom-reports/esm_format-sbom.json
          cd ../..
        fi

        # Node.js SBOM
        if [ -d "packages/esm-format" ]; then
          cd packages/esm-format
          cyclonedx-npm -o ../../sbom-reports/esm-format-sbom.json
          cd ../..
        fi

        if [ -d "packages/esm-editor" ]; then
          cd packages/esm-editor
          cyclonedx-npm -o ../../sbom-reports/esm-editor-sbom.json
          cd ../..
        fi

    - name: Run advanced static analysis
      run: |
        echo "Running Semgrep static analysis..."
        semgrep --config=auto --json --output=semgrep-results.json packages/ || true

        echo "Running Bandit for Python packages..."
        if [ -d "packages/esm_format" ]; then
          bandit -r packages/esm_format -f json -o bandit-results.json || true
        fi

    - name: Upload analysis results
      uses: actions/upload-artifact@v4
      with:
        name: dependency-analysis-${{ github.run_id }}
        path: |
          sbom-reports/
          semgrep-results.json
          bandit-results.json
        retention-days: 90