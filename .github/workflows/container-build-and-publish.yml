name: Container Image Build and Publish

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'packages/**'
      - 'docker/**'
      - 'scripts/build-container-images.sh'
      - '.github/workflows/container-build-and-publish.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'packages/**'
      - 'docker/**'
      - 'scripts/build-container-images.sh'
      - '.github/workflows/container-build-and-publish.yml'
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: 'Push images to container registry'
        required: false
        default: 'false'
        type: boolean
      optimization_profile:
        description: 'Container optimization profile'
        required: false
        default: 'production'
        type: choice
        options:
        - development
        - production
        - minimal
        - all
      target_platforms:
        description: 'Target platforms for build'
        required: false
        default: 'linux/amd64,linux/arm64'
        type: string
      registry:
        description: 'Container registry'
        required: false
        default: 'ghcr.io'
        type: choice
        options:
        - ghcr.io
        - docker.io

env:
  REGISTRY: ${{ github.event.inputs.registry || 'ghcr.io' }}
  NAMESPACE: ${{ github.repository_owner }}
  PROJECT_NAME: esm-format
  OPTIMIZATION_PROFILE: ${{ github.event.inputs.optimization_profile || 'production' }}
  TARGET_PLATFORMS: ${{ github.event.inputs.target_platforms || 'linux/amd64,linux/arm64' }}

jobs:
  # Determine build configuration and what needs to be built
  build-config:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_push: ${{ steps.config.outputs.should_push }}
      languages: ${{ steps.config.outputs.languages }}
      changed_packages: ${{ steps.changes.outputs.changed_packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -f "workspace.json" ]; then
            VERSION=$(jq -r '.version // "dev"' workspace.json)
          else
            VERSION="dev"
          fi

          # Add git hash for uniqueness
          GIT_HASH=$(git rev-parse --short HEAD)
          VERSION="$VERSION-$GIT_HASH"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Determined version: $VERSION"

      - name: Configure build settings
        id: config
        run: |
          # Determine if we should push images
          SHOULD_PUSH="false"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            SHOULD_PUSH="true"
          elif [ "${{ github.event.inputs.push_to_registry }}" = "true" ]; then
            SHOULD_PUSH="true"
          fi

          echo "should_push=$SHOULD_PUSH" >> $GITHUB_OUTPUT
          echo "Will push to registry: $SHOULD_PUSH"

          # Define languages to build
          LANGUAGES='["julia", "typescript", "python", "rust"]'
          echo "languages=$LANGUAGES" >> $GITHUB_OUTPUT

      - name: Detect changed packages
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # For PRs, check what packages changed
            CHANGED_PACKAGES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.sha }} | \
              grep -E '^packages/' | \
              cut -d'/' -f2 | \
              sort -u | \
              jq -R -s 'split("\n") | map(select(length > 0))' || echo '[]')
          else
            # For push to main, build all packages
            CHANGED_PACKAGES='["ESMFormat.jl", "esm-format", "esm_format", "esm-format-rust"]'
          fi

          echo "changed_packages=$CHANGED_PACKAGES" >> $GITHUB_OUTPUT
          echo "Changed packages: $CHANGED_PACKAGES"

  # Build and push container images
  build-and-push:
    runs-on: ubuntu-latest
    needs: build-config
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJson(needs.build-config.outputs.languages) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: ${{ env.TARGET_PLATFORMS }}

      - name: Log in to GitHub Container Registry
        if: needs.build-config.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: needs.build-config.outputs.should_push == 'true' && env.REGISTRY == 'docker.io'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Make build script executable
        run: chmod +x scripts/build-container-images.sh

      # Check if this language package was modified (for PR builds)
      - name: Check if language package changed
        id: package_changed
        run: |
          CHANGED_PACKAGES='${{ needs.build-config.outputs.changed_packages }}'
          LANGUAGE="${{ matrix.language }}"

          # Map language to package name
          case "$LANGUAGE" in
            "julia") PACKAGE_NAME="ESMFormat.jl" ;;
            "typescript") PACKAGE_NAME="esm-format" ;;
            "python") PACKAGE_NAME="esm_format" ;;
            "rust") PACKAGE_NAME="esm-format-rust" ;;
            *) PACKAGE_NAME="$LANGUAGE" ;;
          esac

          # Check if package changed or if this is not a PR
          SHOULD_BUILD="false"
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            SHOULD_BUILD="true"
          elif echo "$CHANGED_PACKAGES" | jq -e ".[] | select(. == \"$PACKAGE_NAME\")" > /dev/null; then
            SHOULD_BUILD="true"
          fi

          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "Should build $LANGUAGE ($PACKAGE_NAME): $SHOULD_BUILD"

      - name: Build container image
        if: steps.package_changed.outputs.should_build == 'true'
        env:
          ESM_VERSION: ${{ needs.build-config.outputs.version }}
          ESM_REGISTRY: ${{ env.REGISTRY }}
          ESM_NAMESPACE: ${{ env.NAMESPACE }}
          ESM_PLATFORMS: ${{ env.TARGET_PLATFORMS }}
          ESM_OPTIMIZATION: ${{ env.OPTIMIZATION_PROFILE }}
          ESM_PUSH_IMAGES: ${{ needs.build-config.outputs.should_push }}
          ESM_BUILD_ARGS: "--build-arg BUILDKIT_INLINE_CACHE=1"
        run: |
          echo "Building ${{ matrix.language }} container with configuration:"
          echo "  Version: $ESM_VERSION"
          echo "  Registry: $ESM_REGISTRY/$ESM_NAMESPACE"
          echo "  Platforms: $ESM_PLATFORMS"
          echo "  Optimization: $ESM_OPTIMIZATION"
          echo "  Push: $ESM_PUSH_IMAGES"

          # Build single language image
          ./scripts/build-container-images.sh

      - name: Test container image
        if: steps.package_changed.outputs.should_build == 'true' && needs.build-config.outputs.should_push == 'false'
        run: |
          LANGUAGE="${{ matrix.language }}"
          IMAGE_NAME="$REGISTRY/$NAMESPACE/$PROJECT_NAME-$LANGUAGE:${{ needs.build-config.outputs.version }}"

          echo "Testing $IMAGE_NAME..."

          # Basic smoke test
          case "$LANGUAGE" in
            "julia")
              docker run --rm "$IMAGE_NAME" julia --version
              ;;
            "typescript")
              docker run --rm "$IMAGE_NAME" node --version
              ;;
            "python")
              docker run --rm "$IMAGE_NAME" python3 --version
              ;;
            "rust")
              docker run --rm "$IMAGE_NAME" esm --version || echo "Rust CLI test skipped"
              ;;
          esac

      - name: Generate SBOM (Software Bill of Materials)
        if: steps.package_changed.outputs.should_build == 'true'
        run: |
          LANGUAGE="${{ matrix.language }}"
          IMAGE_NAME="$REGISTRY/$NAMESPACE/$PROJECT_NAME-$LANGUAGE:${{ needs.build-config.outputs.version }}"

          # Install syft for SBOM generation
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

          # Generate SBOM
          mkdir -p dist/containers/sbom
          syft "$IMAGE_NAME" -o spdx-json=dist/containers/sbom/$LANGUAGE-sbom.spdx.json || true
          syft "$IMAGE_NAME" -o table=dist/containers/sbom/$LANGUAGE-sbom.txt || true

      - name: Security scan with Trivy
        if: steps.package_changed.outputs.should_build == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.PROJECT_NAME }}-${{ matrix.language }}:${{ needs.build-config.outputs.version }}'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.language }}.sarif'
        continue-on-error: true

      - name: Upload Trivy scan results
        if: steps.package_changed.outputs.should_build == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-${{ matrix.language }}.sarif'
        continue-on-error: true

      - name: Upload build artifacts
        if: steps.package_changed.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: container-artifacts-${{ matrix.language }}
          path: |
            dist/containers/
            trivy-results-*.sarif
          retention-days: 30

  # Create multi-architecture manifest and deployment configs
  create-manifests:
    runs-on: ubuntu-latest
    needs: [build-config, build-and-push]
    if: needs.build-config.outputs.should_push == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-architecture manifests
        run: |
          VERSION="${{ needs.build-config.outputs.version }}"
          LANGUAGES=("julia" "typescript" "python" "rust")

          for LANGUAGE in "${LANGUAGES[@]}"; do
            IMAGE_BASE="$REGISTRY/$NAMESPACE/$PROJECT_NAME-$LANGUAGE"

            echo "Creating manifest for $LANGUAGE..."

            # Create manifest for versioned tags
            docker buildx imagetools create \
              --tag "$IMAGE_BASE:$VERSION" \
              "$IMAGE_BASE:$VERSION"

            # Create manifest for latest tag
            docker buildx imagetools create \
              --tag "$IMAGE_BASE:latest" \
              "$IMAGE_BASE:$VERSION"
          done

      - name: Generate deployment documentation
        run: |
          mkdir -p dist/containers/docs

          cat > dist/containers/docs/DEPLOYMENT.md <<EOF
          # EarthSciSerialization Container Deployment Guide

          ## Available Images

          The following container images are available for version \`${{ needs.build-config.outputs.version }}\`:

          - \`$REGISTRY/$NAMESPACE/$PROJECT_NAME-julia:${{ needs.build-config.outputs.version }}\`
          - \`$REGISTRY/$NAMESPACE/$PROJECT_NAME-typescript:${{ needs.build-config.outputs.version }}\`
          - \`$REGISTRY/$NAMESPACE/$PROJECT_NAME-python:${{ needs.build-config.outputs.version }}\`
          - \`$REGISTRY/$NAMESPACE/$PROJECT_NAME-rust:${{ needs.build-config.outputs.version }}\`

          ## Multi-Architecture Support

          All images support multiple architectures:
          - \`linux/amd64\` (Intel/AMD 64-bit)
          - \`linux/arm64\` (ARM 64-bit, including Apple Silicon)

          ## Quick Start

          ### Docker Compose
          \`\`\`bash
          # Download deployment configurations
          curl -O https://github.com/${{ github.repository }}/releases/latest/download/docker-compose.production.yml

          # Start services
          docker-compose -f docker-compose.production.yml up
          \`\`\`

          ### Kubernetes
          \`\`\`bash
          # Apply manifests
          kubectl apply -f https://github.com/${{ github.repository }}/releases/latest/download/k8s-manifests.yaml
          \`\`\`

          ### Individual Container Usage
          \`\`\`bash
          # Run Julia conformance tests
          docker run --rm -v \$(pwd)/results:/workspace/conformance-results \\
            $REGISTRY/$NAMESPACE/$PROJECT_NAME-julia:${{ needs.build-config.outputs.version }}

          # Run Python conformance tests
          docker run --rm -v \$(pwd)/results:/workspace/conformance-results \\
            $REGISTRY/$NAMESPACE/$PROJECT_NAME-python:${{ needs.build-config.outputs.version }}
          \`\`\`

          ## Security

          - All images run as non-root users
          - Security scanning performed with Trivy
          - Software Bill of Materials (SBOM) available
          - Images use minimal base layers

          ## Support

          For issues and support, please visit: https://github.com/${{ github.repository }}/issues
          EOF

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-configs
          path: dist/containers/
          retention-days: 90

  # Comment on PR with container build results
  pr-comment:
    runs-on: ubuntu-latest
    needs: [build-config, build-and-push]
    if: github.event_name == 'pull_request' && always()

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const languages = ${{ needs.build-config.outputs.languages }};
            const changedPackages = ${{ needs.build-config.outputs.changed_packages }};
            const version = "${{ needs.build-config.outputs.version }}";

            let comment = "## 🐳 Container Build Results\n\n";
            comment += `**Version**: \`${version}\`\n`;
            comment += `**Optimization Profile**: \`${{ env.OPTIMIZATION_PROFILE }}\`\n`;
            comment += `**Platforms**: \`${{ env.TARGET_PLATFORMS }}\`\n\n`;

            if (changedPackages.length > 0) {
              comment += "### Changed Packages\n";
              for (const pkg of changedPackages) {
                comment += `- ${pkg}\n`;
              }
              comment += "\n";
            }

            comment += "### Build Status\n";
            comment += "| Language | Status | Image Size | Security Scan |\n";
            comment += "|----------|--------|------------|---------------|\n";

            for (const lang of languages) {
              const jobResult = "${{ needs.build-and-push.result }}"; // This is simplified
              const status = jobResult === 'success' ? '✅ Built' : '❌ Failed';
              comment += `| ${lang} | ${status} | Calculating... | Completed |\n`;
            }

            comment += "\n### Container Images\n";
            if ("${{ needs.build-config.outputs.should_push }}" === "true") {
              comment += "Images have been pushed to registry and are available for deployment.\n";
            } else {
              comment += "Images built successfully but not pushed (PR build).\n";
            }

            comment += "\n📊 [View detailed build logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})";

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Final status check
  build-status:
    runs-on: ubuntu-latest
    needs: [build-config, build-and-push]
    if: always()

    steps:
      - name: Check build results
        run: |
          echo "Build configuration:"
          echo "  Version: ${{ needs.build-config.outputs.version }}"
          echo "  Should push: ${{ needs.build-config.outputs.should_push }}"
          echo "  Changed packages: ${{ needs.build-config.outputs.changed_packages }}"

          if [ "${{ needs.build-and-push.result }}" = "success" ]; then
            echo "✅ All container builds completed successfully"
          else
            echo "❌ Some container builds failed"
            exit 1
          fi