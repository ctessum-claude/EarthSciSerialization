name: Rust CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: ['stable', 'beta', '1.75.0']  # MSRV (minimum supported Rust version)

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy

    - name: Cache Cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          packages/esm-format-rust/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('packages/esm-format-rust/Cargo.lock') }}

    - name: Check formatting
      working-directory: packages/esm-format-rust
      run: cargo fmt --all -- --check

    - name: Run clippy
      working-directory: packages/esm-format-rust
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Build library
      working-directory: packages/esm-format-rust
      run: cargo build --verbose

    - name: Build CLI binary
      working-directory: packages/esm-format-rust
      run: cargo build --bin esm --verbose

    - name: Build WASM
      working-directory: packages/esm-format-rust
      run: cargo build --target wasm32-unknown-unknown --features wasm --verbose
      if: matrix.rust == 'stable'

    - name: Run tests
      working-directory: packages/esm-format-rust
      run: cargo test --verbose --all-features

    - name: Generate documentation
      working-directory: packages/esm-format-rust
      run: cargo doc --no-deps --all-features
      if: matrix.rust == 'stable'

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Update version in Cargo.toml
      working-directory: packages/esm-format-rust
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        sed -i "s/version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
        cargo update -p esm-format --precise $VERSION

    - name: Build for release
      working-directory: packages/esm-format-rust
      run: cargo build --release --all-features

    - name: Publish to crates.io
      working-directory: packages/esm-format-rust
      run: cargo publish
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    - name: Build binary assets
      working-directory: packages/esm-format-rust
      run: |
        # Build for common platforms
        rustup target add x86_64-unknown-linux-gnu
        rustup target add x86_64-apple-darwin
        rustup target add x86_64-pc-windows-gnu

        cargo build --release --target x86_64-unknown-linux-gnu --bin esm
        cargo build --release --target x86_64-apple-darwin --bin esm
        cargo build --release --target x86_64-pc-windows-gnu --bin esm

        # Package binaries
        mkdir -p dist
        cp target/x86_64-unknown-linux-gnu/release/esm dist/esm-linux-x86_64
        cp target/x86_64-apple-darwin/release/esm dist/esm-macos-x86_64
        cp target/x86_64-pc-windows-gnu/release/esm.exe dist/esm-windows-x86_64.exe

    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      with:
        files: packages/esm-format-rust/dist/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}