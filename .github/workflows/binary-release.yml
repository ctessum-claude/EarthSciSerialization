name: Cross-Platform Binary Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_call:
    inputs:
      version:
        description: 'Version to build (e.g., v1.0.0)'
        required: true
        type: string
      platforms:
        description: 'Platforms to build (space-separated)'
        required: false
        type: string
        default: 'linux-x64 macos-x64 macos-arm64 windows-x64'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v1.0.0)'
        required: true
        default: 'v0.1.0'
      platforms:
        description: 'Platforms to build (space-separated)'
        required: false
        default: 'linux-x64 macos-x64 macos-arm64 windows-x64'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Get version
      id: get_version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=${GITHUB_REF#refs/tags/}
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        release_name: EarthSciSerialization ${{ steps.get_version.outputs.version }}
        body: |
          # Cross-Platform Binary Release

          This release includes native executables for multiple platforms:
          - Linux x64
          - macOS x64 (Intel)
          - macOS ARM64 (Apple Silicon)
          - Windows x64

          ## Quick Install
          ```bash
          curl -sSL https://github.com/ctessum/EarthSciSerialization/releases/latest/download/update.sh | bash
          ```

          ## Manual Installation
          1. Download the appropriate binary for your platform
          2. Extract the archive
          3. Run the included install script

          See individual artifacts for platform-specific instructions.
        draft: false
        prerelease: false

  build-binaries:
    name: Build ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || github.event_name == 'release')
    strategy:
      fail-fast: false
      matrix:
        config:
        - {
            name: "Linux x64",
            os: ubuntu-latest,
            platform: "linux-x64",
            rust_target: "x86_64-unknown-linux-gnu",
            binary_name: "esm",
            archive_ext: "tar.gz"
          }
        - {
            name: "macOS x64",
            os: macos-latest,
            platform: "macos-x64",
            rust_target: "x86_64-apple-darwin",
            binary_name: "esm",
            archive_ext: "tar.gz"
          }
        - {
            name: "macOS ARM64",
            os: macos-latest,
            platform: "macos-arm64",
            rust_target: "aarch64-apple-darwin",
            binary_name: "esm",
            archive_ext: "tar.gz"
          }
        - {
            name: "Windows x64",
            os: windows-latest,
            platform: "windows-x64",
            rust_target: "x86_64-pc-windows-gnu",
            binary_name: "esm.exe",
            archive_ext: "zip"
          }

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Get version
      id: get_version
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
        elif [[ "${{ github.event_name }}" == "release" ]]; then
          VERSION="${{ github.event.release.tag_name }}"
        else
          VERSION="${{ needs.create-release.outputs.version }}"
        fi
        echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
        echo "Version: ${VERSION#v}"

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.config.rust_target }}

    - name: Setup Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: packages/esm-format-rust

    - name: Setup Node.js (for TypeScript build)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Python (for Python build)
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install build tools
      shell: bash
      run: |
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          # Install mingw-w64 for cross-compilation
          choco install mingw
        fi

    - name: Build Rust binary
      shell: bash
      working-directory: packages/esm-format-rust
      run: |
        cargo build --release --target ${{ matrix.config.rust_target }} --bin esm

    - name: Prepare distribution
      shell: bash
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"
        PLATFORM="${{ matrix.config.platform }}"
        BINARY_NAME="${{ matrix.config.binary_name }}"
        RUST_TARGET="${{ matrix.config.rust_target }}"

        # Create distribution directory
        DIST_DIR="esm-cli-${VERSION}-${PLATFORM}"
        mkdir -p "$DIST_DIR"

        # Copy binary
        cp "packages/esm-format-rust/target/${RUST_TARGET}/release/${BINARY_NAME}" "$DIST_DIR/"

        # Copy documentation
        cp README.md "$DIST_DIR/" 2>/dev/null || echo "No README found"
        cp LICENSE "$DIST_DIR/" 2>/dev/null || echo "No LICENSE found"

        # Create platform-specific install script
        case "$PLATFORM" in
          *windows*)
            cat > "$DIST_DIR/install.bat" << 'EOF'
        @echo off
        setlocal enabledelayedexpansion

        echo Installing ESM CLI...

        rem Create install directory
        set "INSTALL_DIR=%USERPROFILE%\.local\bin"
        if not exist "%INSTALL_DIR%" mkdir "%INSTALL_DIR%"

        rem Copy binary
        copy esm.exe "%INSTALL_DIR%\" >nul

        rem Add to PATH
        echo %PATH% | findstr /C:"%INSTALL_DIR%" >nul
        if errorlevel 1 (
            echo Adding %INSTALL_DIR% to PATH...
            setx PATH "%PATH%;%INSTALL_DIR%"
            echo Please restart your command prompt.
        )

        echo ESM CLI installed successfully!
        echo Run 'esm --help' to get started.
        pause
        EOF
            ;;
          *)
            cat > "$DIST_DIR/install.sh" << 'EOF'
        #!/bin/bash
        set -euo pipefail

        INSTALL_DIR="${HOME}/.local/bin"
        BINARY_NAME="esm"

        echo "Installing ESM CLI..."
        mkdir -p "$INSTALL_DIR"
        cp "$BINARY_NAME" "$INSTALL_DIR/"
        chmod +x "${INSTALL_DIR}/${BINARY_NAME}"

        # Add to PATH if needed
        if [[ ":$PATH:" != *":$INSTALL_DIR:"* ]]; then
            if [ -n "${ZSH_VERSION:-}" ]; then
                SHELL_CONFIG="$HOME/.zshrc"
            elif [ -n "${BASH_VERSION:-}" ]; then
                SHELL_CONFIG="$HOME/.bashrc"
            else
                SHELL_CONFIG="$HOME/.profile"
            fi

            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$SHELL_CONFIG"
            echo "Added to PATH in $SHELL_CONFIG"
            echo "Restart shell or run: source $SHELL_CONFIG"
        fi

        echo "✓ ESM CLI installed successfully!"
        EOF
            chmod +x "$DIST_DIR/install.sh"
            ;;
        esac

        # Create archive
        if [[ "${{ matrix.config.archive_ext }}" == "zip" ]]; then
          7z a "esm-cli-${VERSION}-${PLATFORM}.zip" "$DIST_DIR"
          ARCHIVE_FILE="esm-cli-${VERSION}-${PLATFORM}.zip"
        else
          tar -czf "esm-cli-${VERSION}-${PLATFORM}.tar.gz" "$DIST_DIR"
          ARCHIVE_FILE="esm-cli-${VERSION}-${PLATFORM}.tar.gz"
        fi

        # Generate checksum
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          certutil -hashfile "$ARCHIVE_FILE" SHA256 > "${ARCHIVE_FILE}.sha256"
        else
          sha256sum "$ARCHIVE_FILE" > "${ARCHIVE_FILE}.sha256"
        fi

        echo "archive_file=$ARCHIVE_FILE" >> $GITHUB_ENV

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url || github.event.release.upload_url }}
        asset_path: ./${{ env.archive_file }}
        asset_name: ${{ env.archive_file }}
        asset_content_type: application/octet-stream

    - name: Upload Checksum
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url || github.event.release.upload_url }}
        asset_path: ./${{ env.archive_file }}.sha256
        asset_name: ${{ env.archive_file }}.sha256
        asset_content_type: text/plain

  create-universal-installer:
    name: Create Universal Installer
    runs-on: ubuntu-latest
    needs: [create-release, build-binaries]
    if: always() && needs.build-binaries.result == 'success'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Get version
      id: get_version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
        elif [[ "${{ github.event_name }}" == "release" ]]; then
          VERSION="${{ github.event.release.tag_name }}"
        else
          VERSION="${{ needs.create-release.outputs.version }}"
        fi
        echo "version=${VERSION#v}" >> $GITHUB_OUTPUT

    - name: Create universal installer script
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"
        REPO="${GITHUB_REPOSITORY}"

        cat > update.sh << 'EOF'
        #!/bin/bash
        set -euo pipefail

        # ESM CLI Universal Installer/Updater
        REPO="$REPO_PLACEHOLDER"
        INSTALL_DIR="${HOME}/.local/bin"

        detect_platform() {
            local os="$(uname -s)"
            local arch="$(uname -m)"

            case "$os" in
                "Linux")
                    case "$arch" in
                        "x86_64"|"amd64") echo "linux-x64" ;;
                        *) echo "unsupported" ;;
                    esac
                    ;;
                "Darwin")
                    case "$arch" in
                        "x86_64") echo "macos-x64" ;;
                        "arm64") echo "macos-arm64" ;;
                        *) echo "unsupported" ;;
                    esac
                    ;;
                "CYGWIN"*|"MINGW"*|"MSYS"*)
                    echo "windows-x64"
                    ;;
                *)
                    echo "unsupported"
                    ;;
            esac
        }

        get_latest_release() {
            curl -s "https://api.github.com/repos/$REPO/releases/latest" | \
                grep '"tag_name":' | \
                sed -E 's/.*"([^"]+)".*/\1/'
        }

        main() {
            local platform="$(detect_platform)"
            if [ "$platform" = "unsupported" ]; then
                echo "❌ Unsupported platform: $(uname -s) $(uname -m)"
                exit 1
            fi

            echo "🔍 Detected platform: $platform"

            local latest_version="$(get_latest_release)"
            if [ -z "$latest_version" ]; then
                echo "❌ Failed to get latest version"
                exit 1
            fi

            echo "📥 Latest version: $latest_version"

            # Check current version
            if command -v esm &> /dev/null; then
                local current_version="$(esm --version 2>/dev/null | grep -o 'v[0-9.]*' || echo 'unknown')"
                if [ "$current_version" = "$latest_version" ]; then
                    echo "✅ Already up to date ($current_version)"
                    exit 0
                fi
                echo "🔄 Updating from $current_version to $latest_version"
            else
                echo "🆕 Installing ESM CLI $latest_version"
            fi

            # Download and install
            local download_url="https://github.com/$REPO/releases/download/$latest_version/esm-cli-${latest_version#v}-$platform.tar.gz"
            local temp_dir="$(mktemp -d)"

            echo "⬇️  Downloading..."
            cd "$temp_dir"
            curl -L -o "esm-cli.tar.gz" "$download_url"
            tar -xzf "esm-cli.tar.gz"

            # Install
            mkdir -p "$INSTALL_DIR"
            cp esm-cli-*/esm "$INSTALL_DIR/"
            chmod +x "$INSTALL_DIR/esm"

            # Add to PATH if needed
            if [[ ":$PATH:" != *":$INSTALL_DIR:"* ]]; then
                if [ -n "${ZSH_VERSION:-}" ]; then
                    SHELL_CONFIG="$HOME/.zshrc"
                elif [ -n "${BASH_VERSION:-}" ]; then
                    SHELL_CONFIG="$HOME/.bashrc"
                else
                    SHELL_CONFIG="$HOME/.profile"
                fi

                echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$SHELL_CONFIG"
                echo "📝 Added to PATH in $SHELL_CONFIG"
                echo "🔄 Please restart your shell or run: source $SHELL_CONFIG"
            fi

            # Cleanup
            rm -rf "$temp_dir"

            echo "✅ ESM CLI installed/updated to $latest_version"
            echo "🚀 Run 'esm --help' to get started!"
        }

        main "$@"
        EOF

        # Replace placeholder with actual repo
        sed -i "s/\$REPO_PLACEHOLDER/$REPO/g" update.sh
        chmod +x update.sh

    - name: Upload Universal Installer
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url || github.event.release.upload_url }}
        asset_path: ./update.sh
        asset_name: update.sh
        asset_content_type: application/x-sh

  update-release-notes:
    name: Update Release Notes
    runs-on: ubuntu-latest
    needs: [create-release, build-binaries, create-universal-installer]
    if: always() && needs.build-binaries.result == 'success'

    steps:
    - name: Update Release Description
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const version = "${{ needs.create-release.outputs.version || github.event.release.tag_name }}".replace(/^v/, '');
          const repo = context.repo;

          const body = `# EarthSciSerialization v${version}

          ## 🚀 Quick Install
          \`\`\`bash
          curl -sSL https://github.com/${repo.owner}/${repo.repo}/releases/latest/download/update.sh | bash
          \`\`\`

          ## 📦 Downloads

          ### Native Executables
          - **Linux x64**: [esm-cli-${version}-linux-x64.tar.gz](https://github.com/${repo.owner}/${repo.repo}/releases/download/v${version}/esm-cli-${version}-linux-x64.tar.gz)
          - **macOS x64**: [esm-cli-${version}-macos-x64.tar.gz](https://github.com/${repo.owner}/${repo.repo}/releases/download/v${version}/esm-cli-${version}-macos-x64.tar.gz)
          - **macOS ARM64**: [esm-cli-${version}-macos-arm64.tar.gz](https://github.com/${repo.owner}/${repo.repo}/releases/download/v${version}/esm-cli-${version}-macos-arm64.tar.gz)
          - **Windows x64**: [esm-cli-${version}-windows-x64.zip](https://github.com/${repo.owner}/${repo.repo}/releases/download/v${version}/esm-cli-${version}-windows-x64.zip)

          ### Universal Tools
          - **Auto-updater**: [update.sh](https://github.com/${repo.owner}/${repo.repo}/releases/download/v${version}/update.sh)

          ## 📋 Installation

          Each binary package includes platform-specific install scripts:
          - **Linux/macOS**: Extract and run \`./install.sh\`
          - **Windows**: Extract and run \`install.bat\`

          ## 🔧 Library Packages
          - **Python**: \`pip install esm-format\`
          - **TypeScript/JavaScript**: \`npm install esm-format\`
          - **Julia**: \`using Pkg; Pkg.add("ESMFormat")\`
          - **Rust**: Add \`esm-format = "${version}"\` to Cargo.toml

          ## ✅ Verification
          All packages include SHA256 checksums for integrity verification.

          ## 🌟 Features
          - Cross-platform native executables
          - Automatic platform detection
          - One-command installation and updates
          - Comprehensive CLI tools for ESM file manipulation
          - Multi-language library support`;

          const release_id = ${{ needs.create-release.outputs.release_id || github.event.release.id }};

          await github.rest.repos.updateRelease({
            owner: repo.owner,
            repo: repo.repo,
            release_id: release_id,
            body: body
          });