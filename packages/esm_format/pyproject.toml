[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "esm-format"
version = "0.1.0"
description = "Earth System Model Serialization Format"
authors = [
    {name = "Chris Tessum", email = "ctessum@uw.edu"}
]
readme = "README.md"
license = {file = "LICENSE"}
requires-python = ">=3.8"
dependencies = [
    "pytest",
    "jsonschema",
    "sympy",
    "pint",
    "numpy",
    "scipy",
    "matplotlib",
    "xarray",
    "netcdf4",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
    "black",
    "flake8",
    "mypy",
]
simulation = [
    "jupyter",
    "ipython",
    "ipywidgets",
    "notebook",
    "seaborn",
    "pandas",
    "scikit-learn",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-dir]
"" = "src"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]